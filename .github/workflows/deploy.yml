name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so the note blog (fetched from RSS at build time) stays fresh.
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (static export)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          # Absolute production URL so metadataBase (OG/canonical URLs)
          # resolves correctly in the static export.
          NEXT_PUBLIC_BASE_URL: "https://peishum5.github.io/profile"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
